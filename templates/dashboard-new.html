<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCM Migration Tool | Palo Alto Networks</title>
    <link rel="shortcut icon" href="/images/favicon.svg" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #ffcb06;
        background-image: url("/images/home-bg.png");
        background-size: cover;
        font-family: "Lato", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e5e5;
        padding: 2.8rem 2.5rem;
        width: 420px;
        max-width: 460px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
        border-radius: 4px;
      }

      .image-div {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-bottom: 5rem;
      }

      .title {
        font-size: 2.6rem;
        font-weight: 700;
        color: #111;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 1.1rem;
        color: #444;
        margin-top: 0.15rem;
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.2rem;
      }

      label {
        display: block;
        font-size: 0.92rem;
        color: #555;
        margin-bottom: 0.45rem;
        font-weight: 400;
      }

      /* file input */
      .file-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #ddd;
        border-radius: 4px;
        font-size: 0.88rem;
        font-family: inherit;
        color: #111;
        background: #fff;
        outline: none;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .file-input:focus {
        border-color: #2563eb;
      }
      .file-input.valid {
        border-color: #0990d0;
      }
      .file-input::file-selector-button {
        border: none;
        background: #f3f4f6;
        padding: 0.3rem 0.75rem;
        margin-right: 0.75rem;
        font-size: 0.8rem;
        font-family: inherit;
        border-radius: 4px;
        cursor: pointer;
        color: #374151;
        font-weight: 500;
      }

      /* select dropdown */
      .select-wrap {
        position: relative;
      }

      select {
        width: 100%;
        padding: 0.78rem 2.5rem 0.78rem 1rem;
        border: 1.5px solid #ddd;
        border-radius: 4px;
        font-size: 0.92rem;
        font-family: inherit;
        color: #111;
        background: #fff;
        outline: none;
        appearance: none;
        cursor: pointer;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      select:focus {
        border-color: #0990d0;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      select.valid {
        border-color: #0990d0;
      }
      select:disabled {
        background: #f9fafb;
        color: #aaa;
        cursor: not-allowed;
      }

      .select-arrow {
        position: absolute;
        right: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: #9ca3af;
      }

      /* hint line */
      .hint {
        font-size: 0.8rem;
        color: #888;
        margin-top: 0.35rem;
        min-height: 1.1rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .hint.success {
        color: #0990d0;
      }
      .hint.error {
        color: #dc2626;
      }

      /* spinner (inline, small) */
      .spinner {
        display: inline-block;
        width: 0.85rem;
        height: 0.85rem;
        border: 2px solid #ddd;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* device badge in dropdown option */
      .device-meta {
        font-size: 0.75rem;
        color: #6b7280;
      }

      /* import button */
      .import-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        font-family: inherit;
        font-weight: 400;
        white-space: nowrap;
        border: 1px solid transparent;
        padding: 10px 24px;
        font-size: 14px;
        line-height: 1em;
        border-radius: 5rem;
        height: 36px;
        min-width: 100px;
        color: #fff;
        background-color: #0ba4e8;
        cursor: pointer;
        opacity: 0.45;
        pointer-events: none;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .import-btn.ready {
        opacity: 1;
        pointer-events: auto;
      }
      .import-btn.ready:hover {
        background: #0990d0;
      }
      .import-btn.ready:active {
        background: #077bb2;
      }
      .import-btn.loading {
        pointer-events: none;
      }

      .btn-spinner {
        display: none;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      /* status */
      .status {
        font-size: 0.85rem;
        color: #555;
        min-height: 1.2rem;
        margin-bottom: 1rem;
        text-align: center;
      }
      .status.error {
        color: #dc2626;
      }
      .status.success {
        color: #0990d0;
      }

      /* footer */
      .footer {
        text-align: center;
        font-size: 0.9rem;
        color: #555;
        border-top: 1px solid #f0f0f0;
        padding-top: 1.2rem;
      }
      .footer a {
        color: #111;
        font-weight: 700;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
      .login-btn-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="image-div">
        <img src="/images/home-logo.png" alt="Palo Alto Networks" />
      </div>

      <!-- Step 1: File -->
      <div class="field">
        <label for="backupFile">Backup file (.xml)</label>
        <input type="file" id="backupFile" accept=".xml" class="file-input" />
        <div id="fileHint" class="hint">
          Choose an .xml backup file to continue
        </div>
      </div>

      <!-- Step 2: Folder / Device -->
      <div class="field">
        <label for="deviceSelect">Target folder</label>
        <div class="select-wrap">
          <select id="deviceSelect" disabled>
            <option value="">— select folder —</option>
          </select>
          <svg
            class="select-arrow"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>
        <div id="deviceHint" class="hint">
          Upload a file first to load folders
        </div>
      </div>

      <div id="statusMsg" class="status"></div>

      <!-- Import button -->
      <div class="login-btn-wrapper">
        <button id="importBtn" class="import-btn" disabled>
          <span id="btnText">Import backup</span>
          <span class="btn-spinner" id="btnSpinner"></span>
        </button>
      </div>
    </div>
    <!-- <div class="footer">
      Made by
      <a href="https://github.com/PaluskarAditya" target="_blank">@aid3n</a>
    </div> -->

    <script>
      (function () {
        const fileInput = document.getElementById("backupFile");
        const deviceSelect = document.getElementById("deviceSelect");
        const importBtn = document.getElementById("importBtn");
        const btnText = document.getElementById("btnText");
        const btnSpinner = document.getElementById("btnSpinner");
        const fileHint = document.getElementById("fileHint");
        const deviceHint = document.getElementById("deviceHint");
        const statusDiv = document.getElementById("statusMsg");

        let isLoadingDevices = false;
        let isImporting = false;

        function setStatus(msg, type = "") {
          statusDiv.textContent = msg;
          statusDiv.className = "status" + (type ? " " + type : "");
        }
        function clearAfter(ms) {
          setTimeout(() => {
            if (!isImporting) setStatus("");
          }, ms);
        }

        function updateImportBtn() {
          const ready =
            fileInput.files.length > 0 &&
            deviceSelect.value &&
            !isImporting &&
            !isLoadingDevices;
          importBtn.classList.toggle("ready", ready);
          importBtn.disabled = !ready;
        }

        function setLoading(on) {
          isImporting = on;
          btnSpinner.style.display = on ? "inline-block" : "none";
          btnText.textContent = on ? "Importing…" : "Import backup \u00a0→";
          importBtn.classList.toggle("loading", on);
          fileInput.disabled = on;
          deviceSelect.disabled = on;
          updateImportBtn();
        }

        // ── File change → fetch devices ──
        fileInput.addEventListener("change", async () => {
          const file = fileInput.files[0];
          if (!file) {
            fileHint.textContent = "Choose an .xml backup file to continue";
            fileHint.className = "hint";
            fileInput.classList.remove("valid");
            deviceSelect.innerHTML =
              '<option value="">— select folder —</option>';
            deviceSelect.disabled = true;
            deviceHint.textContent = "Upload a file first to load folders";
            deviceHint.className = "hint";
            updateImportBtn();
            setStatus("");
            return;
          }

          fileInput.classList.add("valid");
          fileHint.innerHTML = "<span>✓</span> " + file.name;
          fileHint.className = "hint success";

          // show loading state in dropdown
          isLoadingDevices = true;
          deviceSelect.disabled = true;
          deviceSelect.innerHTML = '<option value="">Loading folders…</option>';
          deviceHint.innerHTML =
            '<span class="spinner"></span> Fetching folders…';
          deviceHint.className = "hint";
          updateImportBtn();
          setStatus("");

          try {
            const res = await fetch("/api/v1/get-devices", {
              method: "GET",
              credentials: "include",
            });
            const data = await res.json();

            deviceSelect.innerHTML =
              '<option value="">— select folder —</option>';

            if (!data || data.length === 0) {
              deviceHint.textContent = "No folders available";
              deviceHint.className = "hint error";
            } else {
              // Populate using response shape: { id, name, parent, type, labels[] }
              data.forEach((folder) => {
                const opt = document.createElement("option");
                opt.value = folder.name;
                // Format: "NTIL-FIREWALLS  (ngfw-shared · NTIPL)"
                const label =
                  folder.labels && folder.labels.length
                    ? folder.labels.join(", ")
                    : "";
                opt.textContent =
                  folder.name +
                  (folder.parent || label
                    ? "  (" +
                      [folder.parent, label].filter(Boolean).join(" · ") +
                      ")"
                    : "");
                deviceSelect.appendChild(opt);
              });
              deviceSelect.disabled = false;
              deviceHint.textContent =
                data.length +
                " folder" +
                (data.length > 1 ? "s" : "") +
                " available";
              deviceHint.className = "hint success";
            }
          } catch (err) {
            console.error(err);
            deviceSelect.innerHTML =
              '<option value="">— error loading —</option>';
            deviceHint.textContent = "Failed to load folders";
            deviceHint.className = "hint error";
          } finally {
            isLoadingDevices = false;
            updateImportBtn();
          }
        });

        // ── Device select change ──
        deviceSelect.addEventListener("change", () => {
          updateImportBtn();
          setStatus("");
        });

        // ── Import ──
        importBtn.addEventListener("click", async () => {
          const file = fileInput.files[0];
          const selectedId = deviceSelect.value;
          if (!file || !selectedId || isImporting) return;

          setLoading(true);
          setStatus("Uploading backup…");

          const form = new FormData();
          form.append("backup", file);
          form.append("serial", selectedId);

          try {
            const res = await fetch("/api/v1/import-backup", {
              method: "POST",
              body: form,
              credentials: "include",
            });
            const result = await res.json();

            if (result.success) {
              setStatus("Import started successfully", "success");
              setTimeout(() => {
                setLoading(false);
                clearAfter(2000);
              }, 800);
            } else {
              setStatus(
                "Import failed — " + (result.message || "unknown error"),
                "error",
              );
              setLoading(false);
              clearAfter(3500);
            }
          } catch (err) {
            console.error(err);
            setStatus("Network error during import", "error");
            setLoading(false);
            clearAfter(3500);
          }
        });
      })();
    </script>
  </body>
</html>
