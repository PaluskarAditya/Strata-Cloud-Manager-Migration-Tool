<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCM Migration Tool | Palo Alto Networks</title>
    <link rel="shortcut icon" href="/images/favicon.svg" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @font-face {
        src: url("/fonts/Lato-Regular.woff");
        font-family: "Lato";
      }

      body {
        background: #ffcb06;
        background-image: url("/images/home-bg.png");
        background-size: cover;
        font-family: "Lato", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e5e5;
        padding: 2.8rem 2.5rem;
        width: 420px;
        max-width: 460px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
        border-radius: 4px;
      }

      .image-div {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-bottom: 2.2rem;
      }

      #upload-view {
        display: block;
      }

      .field {
        width: 100%;
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.92rem;
        color: #555;
        margin-bottom: 0.45rem;
        font-weight: 400;
      }

      .file-row {
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      .file-input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1.5px solid #ddd;
        border-radius: 4px;
        font-size: 0.88rem;
        width: 100%;
        margin-right: 1.1rem;
        font-family: inherit;
        color: #111;
        background: #fff;
        outline: none;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .file-input:focus {
        border-color: #006fcc;
      }
      .file-input::file-selector-button {
        border: none;
        padding: 0.3rem 0.75rem;
        margin-right: 0.75rem;
        font-size: 0.8rem;
        font-family: inherit;
        border-radius: 4px;
        cursor: pointer;
        color: #374151;
        font-weight: 500;
      }
      .file-input.valid {
        border-color: #006fcc;
      }

      .template-btn {
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        color: #006fcc;
        background: transparent;
        border: none;
        line-height: 1.3;
        text-align: center;
        flex-shrink: 0;
      }
      .template-btn:hover {
        text-decoration: underline;
      }

      /* ── hint line — always in DOM so JS never hits null ── */
      #fileHint {
        font-size: 0.8rem;
        color: #888;
        margin-top: 0.35rem;
        min-height: 1.1rem;
      }
      #fileHint.success {
        color: #006fcc;
      }
      #fileHint.error {
        color: #dc2626;
      }

      .login-btn-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-top: 0.5rem;
      }

      .login-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        font-family: inherit;
        font-weight: 400;
        white-space: nowrap;
        border: 1px solid transparent;
        padding: 10px 24px;
        font-size: 14px;
        line-height: 1em;
        border-radius: 5rem;
        height: 36px;
        min-width: 100px;
        color: #fff;
        background-color: #0ba4e8;
        cursor: pointer;
        opacity: 0.45;
        pointer-events: none;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .login-btn.ready {
        opacity: 1;
        pointer-events: auto;
      }
      .login-btn.ready:hover {
        background: #0990d0;
      }
      .login-btn.ready:active {
        background: #077bb2;
      }
      .login-btn.loading {
        pointer-events: none;
      }

      .btn-spinner {
        display: none;
        width: 0.9rem;
        height: 0.9rem;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Session view ── */
      #session-view {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        padding: 0.5rem 0 0.8rem;
      }

      .session-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #e0e0e0;
        border-top-color: #0ba4e8;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      .session-msg {
        font-size: 0.95rem;
        color: #444;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="image-div">
        <img src="/images/home-logo.png" alt="Palo Alto Networks" />
      </div>

      <!-- Upload / login form -->
      <div id="upload-view">
        <div class="field">
          <label for="jsonUpload">Upload login.json</label>
          <div class="file-row">
            <input
              type="file"
              id="jsonUpload"
              accept=".json,application/json"
              class="file-input"
            />
            <button id="downloadTemplateBtn" class="template-btn" type="button">
              download<br />template
            </button>
          </div>
          <!-- fileHint MUST be in the DOM — bug was it was missing -->
          <div id="fileHint"></div>
        </div>

        <div class="login-btn-wrapper">
          <button id="loginBtn" class="login-btn" disabled>
            <span id="btnText">Log in</span>
            <span class="btn-spinner" id="loginSpinner"></span>
          </button>
        </div>
      </div>

      <!-- Session creation view -->
      <div id="session-view">
        <div class="session-spinner"></div>
        <div class="session-msg" id="sessionMsg">
          Creating an administrative session…
        </div>
      </div>
    </div>

    <script>
      (function () {
        const jsonUpload = document.getElementById("jsonUpload");
        const downloadTemplateBtn = document.getElementById(
          "downloadTemplateBtn",
        );
        const fileHint = document.getElementById("fileHint");
        const loginBtn = document.getElementById("loginBtn");
        const btnText = document.getElementById("btnText");
        const loginSpinner = document.getElementById("loginSpinner");
        const uploadView = document.getElementById("upload-view");
        const sessionView = document.getElementById("session-view");
        const sessionMsg = document.getElementById("sessionMsg");

        let credentials = null;
        let isSubmitting = false;

        function updateBtn() {
          const ok = credentials && !isSubmitting;
          loginBtn.classList.toggle("ready", ok);
          loginBtn.disabled = !ok;
        }

        function setLoading(on) {
          isSubmitting = on;
          loginSpinner.style.display = on ? "inline-block" : "none";
          btnText.textContent = on ? "Logging in…" : "Log in";
          loginBtn.classList.toggle("loading", on);
          jsonUpload.disabled = on;
          downloadTemplateBtn.disabled = on;
          updateBtn();
        }

        function showSessionView() {
          uploadView.style.display = "none";
          sessionView.style.display = "flex";
          sessionMsg.textContent = "Creating an administrative session…";
        }

        function showUploadView(hintMsg, hintType) {
          sessionView.style.display = "none";
          uploadView.style.display = "block";
          if (hintMsg) {
            fileHint.textContent = hintMsg;
            fileHint.className = hintType || "";
          }
          setLoading(false);
        }

        // Template download
        downloadTemplateBtn.addEventListener("click", () => {
          const tpl = {
            client_id: "you@1770004231.iam.panserviceaccount.com",
            client_secret: "your-secret-here",
            tsg_id: "1770004231",
          };
          const blob = new Blob([JSON.stringify(tpl, null, 2)], {
            type: "application/json",
          });
          const a = Object.assign(document.createElement("a"), {
            href: URL.createObjectURL(blob),
            download: "login.template.json",
          });
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
        });

        // File validation
        jsonUpload.addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) {
            credentials = null;
            jsonUpload.classList.remove("valid");
            fileHint.textContent = "";
            fileHint.className = "";
            updateBtn();
            return;
          }

          const reader = new FileReader();
          reader.onload = function (ev) {
            try {
              const json = JSON.parse(ev.target.result);
              if (!json.client_id || !json.client_secret || !json.tsg_id)
                throw new Error(
                  "Missing fields: client_id, client_secret, tsg_id",
                );

              credentials = {
                id: json.client_id.trim(),
                secret: json.client_secret.trim(),
                tsgId: json.tsg_id.trim(),
              };
              jsonUpload.classList.add("valid");
              fileHint.textContent = "✓ Loaded: " + file.name;
              fileHint.className = "success";
              updateBtn();
            } catch (err) {
              credentials = null;
              jsonUpload.classList.remove("valid");
              jsonUpload.value = "";
              fileHint.textContent = "Invalid JSON — " + err.message;
              fileHint.className = "error";
              updateBtn();
            }
          };
          reader.onerror = function () {
            credentials = null;
            jsonUpload.classList.remove("valid");
            jsonUpload.value = "";
            fileHint.textContent = "Could not read file";
            fileHint.className = "error";
            updateBtn();
          };
          reader.readAsText(file);
        });

        // Login
        loginBtn.addEventListener("click", async function () {
          if (!credentials || isSubmitting) return;
          const { id, secret, tsgId } = credentials;

          setLoading(true);
          showSessionView();

          const ctrl = new AbortController();
          const tid = setTimeout(() => ctrl.abort(), 10000);

          try {
            const res = await fetch("/api/v1/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id, secret, tsgId }),
              signal: ctrl.signal,
              credentials: "include",
            });
            clearTimeout(tid);

            if (res.ok) {
              sessionMsg.textContent = "Session created. Redirecting…";
              setTimeout(() => {
                window.location.href = "/scm/dashboard";
              }, 300);
            } else {
              let msg = "Authentication failed";
              try {
                const d = await res.json();
                msg = d?._error?.message || d?.message || msg;
              } catch (_) {}
              showUploadView("✗ " + msg, "error");
            }
          } catch (err) {
            clearTimeout(tid);
            showUploadView(
              "✗ " +
                (err.name === "AbortError"
                  ? "Request timed out"
                  : "Network error"),
              "error",
            );
          }
        });

        updateBtn();
      })();
    </script>
  </body>
</html>
